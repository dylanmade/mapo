[versions]
agp = "9.2.0"
kotlin = "2.3.21"
ksp = "2.3.7"
composeBom = "2026.04.01"
material3 = "1.5.0-alpha18"
hilt = "2.59.2"
room = "2.8.4"
coreKtx = "1.18.0"
lifecycleRuntimeKtx = "2.10.0"
activityCompose = "1.13.0"
hiltNavigationCompose = "1.3.0"
androidxHiltLifecycleViewModelCompose = "1.3.0"
navigationCompose = "2.9.0"
gson = "2.11.0"
kotlinxCollectionsImmutable = "0.4.0"
hiddenApiBypass = "4.3"
shizuku = "13.1.5"
javasteam = "1.8.0"
spongycastle = "1.58.0.0"
zxing = "3.5.3"
securityCrypto = "1.1.0-alpha06"
kotlinxCoroutines = "1.10.2"
protobufJava = "4.28.3"

# Testing
junit = "4.13.2"
androidxTestExtJunit = "1.2.1"
androidxTestRunner = "1.6.2"
androidxTestCore = "1.6.1"
espressoCore = "3.6.1"
mockk = "1.13.13"
turbine = "1.2.0"
coroutinesTest = "1.10.2"
robolectric = "4.13"

[libraries]
androidx-core-ktx = { group = "androidx.core", name = "core-ktx", version.ref = "coreKtx" }
androidx-lifecycle-runtime-ktx = { group = "androidx.lifecycle", name = "lifecycle-runtime-ktx", version.ref = "lifecycleRuntimeKtx" }
androidx-lifecycle-runtime-compose = { group = "androidx.lifecycle", name = "lifecycle-runtime-compose", version.ref = "lifecycleRuntimeKtx" }
androidx-lifecycle-viewmodel-compose = { group = "androidx.lifecycle", name = "lifecycle-viewmodel-compose", version.ref = "lifecycleRuntimeKtx" }
androidx-activity-compose = { group = "androidx.activity", name = "activity-compose", version.ref = "activityCompose" }

# Compose BOM
androidx-compose-bom = { group = "androidx.compose", name = "compose-bom", version.ref = "composeBom" }
androidx-compose-ui = { group = "androidx.compose.ui", name = "ui" }
androidx-compose-ui-graphics = { group = "androidx.compose.ui", name = "ui-graphics" }
androidx-compose-ui-tooling-preview = { group = "androidx.compose.ui", name = "ui-tooling-preview" }
androidx-compose-material3 = { group = "androidx.compose.material3", name = "material3", version.ref = "material3" }
androidx-compose-material-icons-extended = { group = "androidx.compose.material", name = "material-icons-extended" }
androidx-compose-ui-tooling = { group = "androidx.compose.ui", name = "ui-tooling" }
androidx-compose-ui-text-google-fonts = { group = "androidx.compose.ui", name = "ui-text-google-fonts" }

# Hilt
hilt-android = { group = "com.google.dagger", name = "hilt-android", version.ref = "hilt" }
hilt-compiler = { group = "com.google.dagger", name = "hilt-android-compiler", version.ref = "hilt" }
androidx-hilt-navigation-compose = { group = "androidx.hilt", name = "hilt-navigation-compose", version.ref = "hiltNavigationCompose" }
androidx-hilt-lifecycle-viewmodel-compose = { group = "androidx.hilt", name = "hilt-lifecycle-viewmodel-compose", version.ref = "androidxHiltLifecycleViewModelCompose" }

# Navigation Compose
androidx-navigation-compose = { group = "androidx.navigation", name = "navigation-compose", version.ref = "navigationCompose" }

# Room
room-runtime = { group = "androidx.room", name = "room-runtime", version.ref = "room" }
room-ktx = { group = "androidx.room", name = "room-ktx", version.ref = "room" }
room-compiler = { group = "androidx.room", name = "room-compiler", version.ref = "room" }

# Gson
gson = { group = "com.google.code.gson", name = "gson", version.ref = "gson" }

# Kotlinx
kotlinx-collections-immutable = { group = "org.jetbrains.kotlinx", name = "kotlinx-collections-immutable", version.ref = "kotlinxCollectionsImmutable" }

# Hidden API bypass (LSPosed). Installs runtime exemptions for InputEvent.setDisplayId
# so the accessibility service can route injected key events to a specific display
# (required for the AYN Thor's bottom screen).
hidden-api-bypass = { group = "org.lsposed.hiddenapibypass", name = "hiddenapibypass", version.ref = "hiddenApiBypass" }

# Shizuku (rikka.app). Optional dependency that powers Mapo's analog input modes:
# the UserService runs in Shizuku's shell-uid context, reads `/dev/input/event*`
# directly (no focused-overlay required for motion capture), and injects key events
# via `IInputManager.injectInputEvent` from shell-context (bypasses focus routing).
# Without Shizuku, Mapo's digital remap continues to work via the existing reflection
# inject path — analog modes are simply gated.
shizuku-api = { group = "dev.rikka.shizuku", name = "api", version.ref = "shizuku" }
shizuku-provider = { group = "dev.rikka.shizuku", name = "provider", version.ref = "shizuku" }

# JavaSteam — Kotlin/Java port of SteamKit2. Powers the Steam Input config
# import + browser feature (Phase 8). Used for: Steam Guard QR device-grant
# login, IPublishedFile.QueryFiles via SteamUnifiedMessages, and Workshop
# CDN body fetch. Same library GameNative ships in production on Android.
javasteam = { group = "in.dragonbra", name = "javasteam", version.ref = "javasteam" }

# Spongy Castle — Android-compatible BouncyCastle rebadge. JavaSteam's
# crypto needs BC primitives that conflict with Android's stripped-down
# built-in BC; Spongy provides them under a non-colliding package.
spongycastle = { group = "com.madgag.spongycastle", name = "prov", version.ref = "spongycastle" }

# ZXing core — QR bitmap generation for the Steam Guard QR login screen.
zxing-core = { group = "com.google.zxing", name = "core", version.ref = "zxing" }

# AndroidX security-crypto — EncryptedSharedPreferences for persisting the
# Steam refresh token + account name across app launches.
androidx-security-crypto = { group = "androidx.security", name = "security-crypto", version.ref = "securityCrypto" }

# Kotlinx coroutines — explicit deps for :steam-client (which doesn't get
# them transitively via AndroidX). JDK8 extension supplies CompletableFuture.await(),
# used to bridge JavaSteam's CompletableFuture API into suspend functions.
kotlinx-coroutines-core = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-core", version.ref = "kotlinxCoroutines" }
kotlinx-coroutines-jdk8 = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-jdk8", version.ref = "kotlinxCoroutines" }

# Protobuf runtime — JavaSteam's response types extend GeneratedMessage,
# so any code that reads response bodies needs protobuf-java on its
# compile classpath. JavaSteam ships its own bundled version but doesn't
# expose it transitively at compile time.
protobuf-java = { group = "com.google.protobuf", name = "protobuf-java", version.ref = "protobufJava" }

# Testing
junit = { group = "junit", name = "junit", version.ref = "junit" }
androidx-test-ext-junit = { group = "androidx.test.ext", name = "junit", version.ref = "androidxTestExtJunit" }
androidx-test-runner = { group = "androidx.test", name = "runner", version.ref = "androidxTestRunner" }
androidx-test-core-ktx = { group = "androidx.test", name = "core-ktx", version.ref = "androidxTestCore" }
androidx-test-espresso-core = { group = "androidx.test.espresso", name = "espresso-core", version.ref = "espressoCore" }
mockk = { group = "io.mockk", name = "mockk", version.ref = "mockk" }
mockk-android = { group = "io.mockk", name = "mockk-android", version.ref = "mockk" }
turbine = { group = "app.cash.turbine", name = "turbine", version.ref = "turbine" }
kotlinx-coroutines-test = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-test", version.ref = "coroutinesTest" }
androidx-compose-ui-test-junit4 = { group = "androidx.compose.ui", name = "ui-test-junit4" }
androidx-compose-ui-test-manifest = { group = "androidx.compose.ui", name = "ui-test-manifest" }
androidx-room-testing = { group = "androidx.room", name = "room-testing", version.ref = "room" }
hilt-android-testing = { group = "com.google.dagger", name = "hilt-android-testing", version.ref = "hilt" }
robolectric = { group = "org.robolectric", name = "robolectric", version.ref = "robolectric" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
android-library = { id = "com.android.library", version.ref = "agp" }
kotlin-compose = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
kotlin-parcelize = { id = "org.jetbrains.kotlin.plugin.parcelize", version.ref = "kotlin" }
hilt = { id = "com.google.dagger.hilt.android", version.ref = "hilt" }
ksp = { id = "com.google.devtools.ksp", version.ref = "ksp" }
